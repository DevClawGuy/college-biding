  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#312e81"/>
  <text x="600" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle">houserush.vercel.app — Built for Monmouth University students</text>
