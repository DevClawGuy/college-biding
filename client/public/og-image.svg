<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#1e1b4b"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Logo icon -->
  <rect x="520" y="180" width="60" height="60" rx="14" fill="#6366f1"/>
  <text x="550" y="222" font-family="system-ui, sans-serif" font-size="32" fill="white" text-anchor="middle">⚡</text>
  <!-- Brand name -->
  <text x="600" y="310" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">HouseRush</text>
  <!-- Subtitle -->
  <text x="600" y="370" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#a5b4fc" text-anchor="middle">Off-Campus Student Housing</text>
